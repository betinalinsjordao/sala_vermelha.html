<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sala Vermelha PR2 — Emergências Médicas</title>
<style>
:root{
  --bg:#1a1614; --surface:#221c19; --surface-2:#2b2320; --raise:#332a25;
  --ink:#ece4d8; --ink-dim:#a89684; --ink-faint:#7d6e60;
  --line:#3a302a; --line-soft:#2f2722;
  --clay:#c87f56; --clay-soft:#a86a48;
  --oxblood:#b23a2e; --oxblood-deep:#7e271f;
  --sage:#8b9a73; --sage-deep:#6f7d5a;
  --gold:#c9a24b;
  --serif:Georgia,'Times New Roman',serif;
  --mono:'SFMono-Regular',ui-monospace,'Cascadia Mono','Courier New',monospace;
  --r:10px; --maxw:780px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink); font-family:var(--serif);
  font-size:17px; line-height:1.62; -webkit-font-smoothing:antialiased;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.wrap{max-width:var(--maxw); margin:0 auto; padding:28px 22px 90px}
h1,h2,h3{font-weight:normal; line-height:1.2; margin:0}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
.mono{font-family:var(--mono)}
.dim{color:var(--ink-dim)}
.faint{color:var(--ink-faint)}
a{color:var(--clay)}

/* ---------- top brand ---------- */
.brand{display:flex; align-items:center; gap:13px; margin-bottom:6px}
.brand .pulse{width:11px;height:11px;border-radius:50%;background:var(--oxblood);
  box-shadow:0 0 0 0 rgba(178,58,46,.55); animation:pulse 2.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(178,58,46,.5)}70%{box-shadow:0 0 0 9px rgba(178,58,46,0)}100%{box-shadow:0 0 0 0 rgba(178,58,46,0)}}
.brand .title{font-size:14px; letter-spacing:.28em; text-transform:uppercase; color:var(--ink-dim)}
.lede{font-size:30px; letter-spacing:-.01em; margin:14px 0 4px}
.lede em{font-style:italic; color:var(--clay)}
.sub{color:var(--ink-dim); font-size:16px; max-width:54ch}

/* ---------- hub cards ---------- */
.hubgrid{margin-top:30px; display:flex; flex-direction:column; gap:12px}
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--r);
  padding:18px 20px; display:flex; align-items:center; gap:16px; text-align:left; width:100%;
  transition:border-color .18s, background .18s, transform .12s}
.card:hover{border-color:var(--clay-soft); background:var(--surface-2)}
.card:active{transform:translateY(1px)}
.card .glyph{font-family:var(--mono); font-size:13px; color:var(--clay);
  border:1px solid var(--line); border-radius:7px; width:42px; height:42px; flex:0 0 42px;
  display:flex; align-items:center; justify-content:center; letter-spacing:.04em}
.card .body{flex:1; min-width:0}
.card .name{font-size:19px}
.card .desc{color:var(--ink-dim); font-size:14.5px; margin-top:2px}
.card .meta{font-family:var(--mono); font-size:11.5px; color:var(--ink-faint); letter-spacing:.03em; margin-top:5px; text-transform:uppercase}
.card .chev{color:var(--ink-faint); font-size:20px}

/* ---------- back / header bar ---------- */
.topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; gap:12px}
.back{font-family:var(--mono); font-size:12.5px; letter-spacing:.06em; color:var(--ink-dim);
  text-transform:uppercase; display:inline-flex; align-items:center; gap:7px}
.back:hover{color:var(--clay)}
.modetag{font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink-faint); border:1px solid var(--line); padding:4px 9px; border-radius:20px}

/* ---------- patient monitor strip (signature) ---------- */
.monitor{background:linear-gradient(180deg,#15110f,#1d1714); border:1px solid var(--line);
  border-radius:var(--r); padding:13px 8px; margin-bottom:18px; position:relative; overflow:hidden}
.monitor::after{content:""; position:absolute; inset:0; pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(255,255,255,.012) 0 1px,transparent 1px 3px)}
.vitrow{display:flex; flex-wrap:wrap; gap:4px 0; justify-content:space-around}
.vital{flex:1 1 70px; text-align:center; padding:3px 6px; position:relative; z-index:1}
.vital .lab{font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; color:var(--ink-faint); text-transform:uppercase}
.vital .val{font-family:var(--mono); font-size:23px; line-height:1.1; color:var(--sage); margin-top:1px}
.vital .val .u{font-size:11px; color:var(--ink-faint)}
.vital.crit .val{color:var(--oxblood); animation:blink 1.3s steps(2,start) infinite}
.vital.warn .val{color:var(--gold)}
@keyframes blink{50%{opacity:.45}}

/* ---------- case prose ---------- */
.casehead{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin-bottom:4px}
.casehead .who{font-size:21px}
.casehead .chip{font-family:var(--mono); font-size:11px; letter-spacing:.06em; color:var(--clay);
  border:1px solid var(--clay-soft); border-radius:14px; padding:2px 9px; text-transform:uppercase}
.narr{color:var(--ink); font-size:17px; margin:12px 0}
.narr .hl{color:var(--clay)}
.exam{background:var(--surface); border-left:2px solid var(--line); padding:11px 15px; border-radius:0 8px 8px 0; margin:14px 0; font-size:15.5px; color:var(--ink-dim)}
.exam b{color:var(--ink); font-weight:normal}

/* ---------- step / question ---------- */
.step{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:18px 18px 16px; margin:14px 0}
.step .etapa{font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-faint)}
.step .q{font-size:18.5px; margin:6px 0 14px}
.field{display:flex; gap:9px; flex-wrap:wrap}
.field input[type=text]{flex:1; min-width:0; background:var(--bg); border:1px solid var(--line);
  border-radius:8px; color:var(--ink); font-family:var(--serif); font-size:16.5px; padding:12px 14px}
.field input:focus{outline:none; border-color:var(--clay)}
.btn{background:var(--clay); color:#1a1410; border-radius:8px; padding:12px 18px; font-size:15px;
  font-family:var(--mono); letter-spacing:.05em; text-transform:uppercase; transition:background .15s}
.btn:hover{background:#d68d62}
.btn.ghost{background:transparent; border:1px solid var(--line); color:var(--ink-dim)}
.btn.ghost:hover{border-color:var(--clay); color:var(--clay)}
.btn:disabled{opacity:.4; cursor:default}
.btnrow{display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; align-items:center}

/* ---------- choices ---------- */
.choices{display:flex; flex-direction:column; gap:9px; margin-top:6px}
.choice{background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:12px 15px;
  text-align:left; font-size:16px; display:flex; gap:11px; align-items:flex-start; transition:border-color .15s, background .15s}
.choice:hover{border-color:var(--clay-soft)}
.choice .k{font-family:var(--mono); color:var(--clay); flex:0 0 auto}
.choice.correct{border-color:var(--sage-deep); background:rgba(139,154,115,.1)}
.choice.wrong{border-color:var(--oxblood-deep); background:rgba(178,58,46,.09)}
.choice.disabled{pointer-events:none; opacity:.85}

/* ---------- feedback (preceptor voice) ---------- */
.feedback{border-radius:var(--r); padding:15px 17px; margin-top:14px; font-size:16px; border:1px solid var(--line)}
.feedback .who{font-family:var(--mono); font-size:11px; letter-spacing:.13em; text-transform:uppercase; display:block; margin-bottom:6px}
.feedback.good{background:rgba(139,154,115,.09); border-color:var(--sage-deep)}
.feedback.good .who{color:var(--sage)}
.feedback.part{background:rgba(201,162,75,.08); border-color:#8a722f}
.feedback.part .who{color:var(--gold)}
.feedback.miss{background:rgba(178,58,46,.08); border-color:var(--oxblood-deep)}
.feedback.miss .who{color:var(--oxblood)}

/* ---------- results / labs ---------- */
.labpanel{background:var(--surface-2); border:1px solid var(--line); border-radius:var(--r); padding:14px 16px; margin:14px 0}
.labpanel .cap{font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:9px}
.labgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px 14px}
.lab{font-family:var(--mono); font-size:14px}
.lab .n{color:var(--ink-faint); font-size:11px; display:block; letter-spacing:.04em}
.lab .v{color:var(--ink); font-size:16px}
.lab .v.hi{color:var(--oxblood)} .lab .v.lo{color:var(--gold)}

/* ---------- ECG ---------- */
.ecgbox{background:#120e0c; border:1px solid var(--line); border-radius:var(--r); padding:6px; margin:14px 0; position:relative}
.ecgbox svg{display:block; width:100%; height:auto}
.ecgbox .lead{position:absolute; top:8px; left:12px; font-family:var(--mono); font-size:10px; color:var(--sage-deep); letter-spacing:.1em}
.ecgline{fill:none; stroke:var(--sage); stroke-width:1.6; stroke-linejoin:round; stroke-linecap:round}
.ecggrid{stroke:rgba(178,58,46,.13); stroke-width:.5}
@media (prefers-reduced-motion:no-preference){
  .ecgline.draw{stroke-dasharray:4000; stroke-dashoffset:4000; animation:trace 2.6s ease-out forwards}
}
@keyframes trace{to{stroke-dashoffset:0}}

/* ---------- resumo PR2 ---------- */
.resumo{background:linear-gradient(180deg,var(--surface-2),var(--surface)); border:1px solid var(--clay-soft);
  border-radius:var(--r); padding:20px; margin:16px 0}
.resumo h3{font-size:14px; font-family:var(--mono); letter-spacing:.18em; text-transform:uppercase; color:var(--clay); margin-bottom:12px}
.resumo dl{margin:0} .resumo dt{font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); margin-top:12px}
.resumo dd{margin:3px 0 0; font-size:16px}
.resumo .pega{color:var(--gold)}

/* ---------- progress / chips ---------- */
.scorebar{font-family:var(--mono); font-size:12px; color:var(--ink-faint); letter-spacing:.05em; margin-top:6px}
.pillrow{display:flex; flex-wrap:wrap; gap:7px; margin:14px 0}
.pill{font-family:var(--mono); font-size:11px; letter-spacing:.05em; text-transform:uppercase;
  border:1px solid var(--line); border-radius:16px; padding:5px 11px; color:var(--ink-dim); background:var(--surface)}
.pill.on{border-color:var(--clay-soft); color:var(--clay)}
.pill.done{border-color:var(--sage-deep); color:var(--sage)}

/* ---------- list (library / picker) ---------- */
.list{display:flex; flex-direction:column; gap:9px; margin-top:14px}
.litem{background:var(--surface); border:1px solid var(--line); border-radius:9px; padding:14px 16px; text-align:left; width:100%; display:flex; justify-content:space-between; align-items:center; gap:12px; transition:border-color .15s}
.litem:hover{border-color:var(--clay-soft)}
.litem .t{font-size:16.5px}
.litem .s{font-family:var(--mono); font-size:11px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.05em}
.litem .tag{font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; color:var(--clay); border:1px solid var(--line); border-radius:12px; padding:3px 8px}
.litem.solved{opacity:.78} .litem.solved .t::before{content:"✓ "; color:var(--sage)}

/* ---------- calculator ---------- */
.calc label{display:block; font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint); margin:14px 0 5px}
.calc input,.calc select{width:100%; background:var(--bg); border:1px solid var(--line); border-radius:8px; color:var(--ink); font-family:var(--mono); font-size:16px; padding:11px 13px}
.calc input:focus,.calc select:focus{outline:none; border-color:var(--clay)}
.bodymap{display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-top:6px}
.bodybtn{background:var(--surface); border:1px solid var(--line); border-radius:8px; padding:9px 6px; font-size:13px; text-align:center; transition:border-color .15s}
.bodybtn .pct{font-family:var(--mono); font-size:11px; color:var(--ink-faint); display:block}
.bodybtn.sel{border-color:var(--clay); background:rgba(200,127,86,.12)}
.calcout{background:var(--surface-2); border:1px solid var(--clay-soft); border-radius:var(--r); padding:18px; margin-top:18px; font-family:var(--mono)}
.calcout .big{font-size:30px; color:var(--clay)} .calcout .lab{font-size:11px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.1em}
.calcout .row{display:flex; justify-content:space-between; padding:7px 0; border-top:1px solid var(--line-soft); font-size:14px}
.calcout .row:first-of-type{border-top:none}

/* ---------- misc ---------- */
.note{font-size:13.5px; color:var(--ink-faint); border-left:2px solid var(--line); padding:4px 0 4px 13px; margin:14px 0}
hr.sep{border:none; border-top:1px solid var(--line-soft); margin:22px 0}
.center{text-align:center}
.bigscore{font-family:var(--mono); font-size:46px; color:var(--clay); text-align:center; margin:10px 0}
.disclaimer{font-size:12px; color:var(--ink-faint); margin-top:40px; border-top:1px solid var(--line-soft); padding-top:16px; line-height:1.5}
@media(max-width:480px){
  .lede{font-size:25px} .wrap{padding:22px 16px 80px}
  .vital .val{font-size:19px}
}

/* ---------- camada preceptor (didática) — reaproveita os tokens existentes ---------- */
.teach{background:var(--surface-2); border:1px solid var(--line); border-radius:var(--r); padding:2px 17px 15px; margin-top:13px}
.teach-sec{padding:13px 0 3px; border-top:1px solid var(--line-soft)}
.teach-sec:first-child{border-top:none}
.tlabel{font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--clay); display:block; margin-bottom:6px}
.teach-sec p{margin:0; font-size:15.5px; color:var(--ink); line-height:1.55}
.think{margin:0; padding:0; list-style:none}
.think li{position:relative; padding:5px 0 5px 18px; font-size:15px; color:var(--ink-dim); line-height:1.5}
.think li::before{content:"↳"; position:absolute; left:0; color:var(--sage-deep)}
.decore{background:rgba(200,127,86,.08); border:1px solid var(--clay-soft); border-radius:9px; padding:12px 15px; margin-top:12px}
.decore .tlabel{color:var(--clay)}
.decore ul{margin:4px 0 0; padding:0; list-style:none}
.decore li{position:relative; padding-left:16px; font-family:var(--mono); font-size:13.5px; color:var(--ink); margin-bottom:4px; line-height:1.45}
.decore li::before{content:"›"; position:absolute; left:0; color:var(--clay)}
.teach-btns{display:flex; flex-wrap:wrap; gap:8px; margin-top:14px}
.tbtn{font-family:var(--mono); font-size:11px; letter-spacing:.04em; text-transform:uppercase; border:1px solid var(--line); border-radius:18px; padding:8px 13px; color:var(--ink-dim); background:var(--surface); transition:border-color .15s,color .15s}
.tbtn:hover{border-color:var(--clay); color:var(--clay)}
.treveal{display:none; margin-top:11px; padding:13px 15px; border-radius:9px; font-size:15px; line-height:1.55; color:var(--ink); border:1px solid var(--line); border-left:3px solid var(--sage-deep); background:rgba(139,154,115,.07)}
.treveal b{color:var(--ink); font-weight:normal}
.treveal.simples{border-left-color:var(--gold); background:rgba(201,162,75,.07)}
.treveal.erro{border-left-color:var(--oxblood); background:rgba(178,58,46,.08)}
.fluxo{font-family:var(--mono); font-size:13px; line-height:1.45; text-align:center; color:var(--ink); background:#120e0c; border:1px solid var(--line); border-radius:var(--r); padding:16px 12px; margin-top:10px}
.fluxo .fstep{display:block; padding:2px 0}
.fluxo .farr{display:block; color:var(--clay); margin:1px 0}
.fluxo .fstep.q{color:var(--gold)}
.fluxo .fstep.end{color:var(--sage)}

/* ---------- 📋 Dados disponíveis — painel fixo e recolhível ---------- */
.dados{position:sticky; top:8px; z-index:30; background:var(--surface); border:1px solid var(--clay-soft); border-radius:var(--r); margin:14px 0 18px; box-shadow:0 8px 24px rgba(0,0,0,.4); overflow:hidden}
.dados-head{display:flex; width:100%; justify-content:space-between; align-items:center; padding:11px 15px; background:var(--surface-2); border:none; cursor:pointer}
.dh-t{font-family:var(--mono); font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--clay)}
.dh-c{color:var(--clay); font-size:13px}
.dados-body{padding:13px 15px; max-height:46vh; overflow-y:auto}
.dados-body .monitor{margin:0 0 2px}
.dados-body .cap{font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:7px}
.ddiv{border:none; border-top:1px solid var(--line-soft); margin:13px 0}
.dnote{font-size:14.5px; color:var(--ink-dim); margin:0; line-height:1.5}
.dados-empty{font-size:14px; color:var(--ink-faint); margin:0; font-style:italic}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
/* ============================================================
   SALA VERMELHA PR2 — conteúdo 100% baseado no livro
   Medicina de Emergência: Abordagem Prática, USP HC-FMUSP, 18ª ed.
   Estilo de cobrança calibrado pelas provas CITTÁ + Desafio Sala Vermelha.
   ============================================================ */

/* ---------- storage (offline-safe, nunca quebra) ---------- */
const Store=(()=>{let mem={};try{const k='_sv_t';localStorage.setItem(k,'1');localStorage.removeItem(k);
  return{get:k=>{try{return localStorage.getItem(k)}catch(e){return mem[k]??null}},
         set:(k,v)=>{try{localStorage.setItem(k,v)}catch(e){mem[k]=v}}};}
  catch(e){return{get:k=>mem[k]??null,set:(k,v)=>{mem[k]=v}};}})();
function loadProgress(){try{return JSON.parse(Store.get('sv_prog')||'{}')}catch(e){return{}}}
function saveProgress(p){Store.set('sv_prog',JSON.stringify(p))}
let PROG=loadProgress();
function markSolved(kind,id){PROG[kind]=PROG[kind]||{};PROG[kind][id]=true;saveProgress(PROG)}
function isSolved(kind,id){return !!(PROG[kind]&&PROG[kind][id])}
function countSolved(kind){return PROG[kind]?Object.keys(PROG[kind]).length:0}

/* ---------- answer engine (permissivo) ---------- */
function norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();}
function lev(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;
  let d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){const c=a[i-1]===b[j-1]?0:1;
    d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+c);}return d[m][n];}
function fuzzyHas(input,term){
  const I=norm(input),T=norm(term);if(!T)return false;
  if(I.includes(T))return true;                       // entrada contém o termo inteiro (cobre abreviações listadas e termos compostos)
  const it=I.split(' ').filter(Boolean),tt=T.split(' ').filter(Boolean);
  return tt.every(tk=>it.some(iw=>{
    if(iw===tk)return true;
    if(tk.length>=4 && iw.includes(tk))return true;   // palavra digitada contém o token do termo (ex.: "cardioversao" ⊃ "cardioversao")
    if(iw.length>=4 && tk.startsWith(iw))return true;   // prefixo/abreviação ≥4 letras (ex.: "nora" → "noradrenalina"); prefixo evita "ventricular" casar com "supraventricular"
    const tol = tk.length>8?2 : tk.length>5?1 : 0;     // tolerância de erro de digitação; tol≤1 em palavras médias evita colisão estável/instável
    return tol>0 && lev(iw,tk)<=tol;
  }));
}
function anyHas(input,terms){return (terms||[]).some(t=>fuzzyHas(input,t));}
// grade open answer -> 'good' | 'part' | 'miss'
function gradeOpen(input,q){
  if(q.reject&&anyHas(input,q.reject))return 'miss';
  if(anyHas(input,q.accept))return 'good';
  if(q.partial&&anyHas(input,q.partial))return 'part';
  return 'miss';
}

/* ---------- ECG generator (SVG) ---------- */
function ecgSVG(type,lead){
  const W=660,H=130,base=70;lead=lead||'DII';
  // grid
  let grid='';for(let x=0;x<=W;x+=22)grid+=`<line class="ecggrid" x1="${x}" y1="0" x2="${x}" y2="${H}"/>`;
  for(let y=0;y<=H;y+=22)grid+=`<line class="ecggrid" x1="0" y1="${y}" x2="${W}" y2="${y}"/>`;
  const cfg={
    sinus:{rate:170,p:1,qrsW:8,t:1,amp:34},
    brady:{rate:300,p:1,qrsW:8,t:1,amp:34},
    taqsinus:{rate:120,p:1,qrsW:8,t:1,amp:30},
    fa:{rate:150,p:0,qrsW:8,t:1,amp:32,irr:1,fib:1},
    flutter:{rate:120,p:0,qrsW:8,t:0,amp:30,saw:1},
    tsv:{rate:96,p:0,qrsW:7,t:1,amp:30},
    tv:{rate:118,p:0,qrsW:26,t:0,amp:40,wide:1},
    fv:{fvf:1},
    bav1:{rate:185,p:1,qrsW:8,t:1,amp:34,prlong:1},
    bav2m1:{rate:185,p:1,qrsW:8,t:1,amp:34,wenck:1},
    bav3:{rate:0,bav3:1},
    stemi:{rate:185,p:1,qrsW:8,t:1,amp:34,st:1},
    bavhi:{rate:330,p:1,qrsW:8,t:1,amp:34,drop:1}
  }[type]||{rate:170,p:1,qrsW:8,t:1,amp:34};
  let pts=[];let x=8;
  const push=(xx,yy)=>pts.push([xx,base-yy]);
  if(cfg.fvf){ // VF chaotic
    push(8,0);for(let xx=10;xx<W-6;xx+=6){const y=(Math.sin(xx*0.5)+Math.sin(xx*0.23)*0.7+Math.sin(xx*0.9)*0.5)*22*(0.6+0.4*Math.random());push(xx,y);}push(W-6,0);
  } else if(cfg.bav3){ // independent P (fast) and QRS (slow)
    // draw QRS slow regular
    const qrsInt=200;let q=40;const qpos=[];while(q<W-20){qpos.push(q);q+=qrsInt;}
    // P waves faster, independent
    const pInt=92;let p=20;const ppos=[];while(p<W-10){ppos.push(p);p+=pInt;}
    push(8,0);
    for(let xx=8;xx<W-6;xx+=2){let y=0;
      ppos.forEach(pp=>{const d=xx-pp;if(d>-7&&d<7)y+=8*Math.cos(d/7*Math.PI/2);});
      qpos.forEach(qq=>{const d=xx-qq;if(d>=-4&&d<0)y-=10;else if(d>=0&&d<4)y+=34;else if(d>=4&&d<8)y-=10;});
      push(xx,y);}
  } else {
    push(8,0);
    let cyc=cfg.rate;let beat=0;let dropNext=false;let pr=22;
    while(x<W-cfg.qrsW-30){
      let thisCyc=cyc;
      if(cfg.irr)thisCyc=cyc*(0.7+Math.random()*0.6); // FA irregular
      if(cfg.wenck){pr=22+beat%4*9;if(beat%4===3){/* dropped QRS */ } }

      const segStart=x;
      if(cfg.fib){for(let xx=x;xx<x+thisCyc-cfg.qrsW-20;xx+=5){push(xx,(Math.random()-0.5)*7);}x+=Math.max(0,thisCyc-cfg.qrsW-20);}
      else if(cfg.saw){for(let xx=x;xx<x+thisCyc-cfg.qrsW-16;xx+=8){const ph=((xx-segStart)%26)/26;push(xx,-(ph*14-7));}x+=Math.max(0,thisCyc-cfg.qrsW-16);}
      else{ // P wave
        if(cfg.p){push(x+6,0);push(x+12,8);push(x+18,0);}
        const prlen=cfg.prlong?pr+20:(cfg.wenck?pr:pr);
        x+= (cfg.p?18:0)+ (thisCyc - (cfg.p?18:0) - cfg.qrsW - 26);
        push(x,0); // PR baseline end
      }
      // QRS (skip if Wenckebach drop or high-grade drop)
      const drop=(cfg.wenck&&beat%4===3)||(cfg.drop&&beat%3===2);
      if(!drop){
        if(cfg.wide){push(x+3,-12);push(x+9,cfg.amp);push(x+15,-14);push(x+22,18);push(x+26,0);}
        else{push(x+2,-9);push(x+5,cfg.amp);push(x+8,-11);push(x+cfg.qrsW,0);}
        x+=cfg.qrsW+4;
        if(cfg.st){push(x+3,12);push(x+10,12);push(x+16,18);push(x+24,4);x+=24;} // ST elevation + T
        else if(cfg.t){push(x+8,0);push(x+16,11);push(x+24,0);x+=24;}
        else x+=10;
      } else {push(x+10,0);x+=14;}
      x+=8;beat++;
    }
    push(W-6,0);
  }
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  return `<div class="ecgbox"><span class="lead">${lead} · 25 mm/s</span>
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${grid}<path class="ecgline draw" d="${d}"/></svg></div>`;
}

/* ---------- vital flag helpers ---------- */
function vital(lab,val,unit,flag){return `<div class="vital ${flag||''}"><div class="lab">${lab}</div><div class="val">${val}${unit?`<span class="u"> ${unit}</span>`:''}</div></div>`;}
function monitor(v){ // v: array of [lab,val,unit,flag]
  return `<div class="monitor"><div class="vitrow">${v.map(x=>vital(x[0],x[1],x[2],x[3])).join('')}</div></div>`;}

/* escape */
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

   accept:['sim','pulmonar','pneumonia','respiratorio','pulmao'],partial:['infeccao'],
   fb:{good:`Sim — foco pulmonar (tosse, febre, crepitações em base). O pulmão é o foco mais comum de sepse.`,part:`Há infecção; o foco aqui é pulmonar (pneumonia).`,miss:`Tosse + febre + crepitações = foco pulmonar. Pneumonia é a causa mais comum de sepse.`},
   teach:{reconhecer:`Febre, tosse produtiva e crepitações localizam o foco pulmonar.`,pensar:[`Primeiro confirme a infecção e o foco.`,`Pulmão é o foco nº 1 de sepse.`],
    decore:[`Foco mais comum de sepse = pulmão`],preceptor:`Toda sepse tem um foco — procure-o desde o início.`}},
  {type:'q',etapa:'Etapa 2 · Disfunção orgânica?',q:`Há disfunção orgânica? Cite sinais.`,
   accept:['sim','hipotensao','confusao','rebaixamento','taquipneia','lactato','renal'],partial:['disfuncao'],
   fb:{good:`Sim — hipotensão, rebaixamento, taquipneia e (nos exames) lesão renal e lactato alto. Infecção + disfunção = sepse.`,miss:`Hipotensão + confusão + taquipneia já sinalizam disfunção orgânica. Infecção + disfunção = sepse.`},
   teach:{reconhecer:`Disfunção orgânica: hipotensão, rebaixamento, taquipneia, oligúria, lesão renal, lactato alto.`,
    pensar:[`Infecção + disfunção orgânica (↑≥2 SOFA) = sepse.`,`qSOFA (FR≥22, PAS≤100, mental) rastreia à beira do leito.`],
    pegadinha:`Parar em "pneumonia" e não nomear a sepse — é o nome que dispara o relógio do antibiótico.`,
    decore:[`Sepse = infecção + disfunção orgânica`,`qSOFA = FR≥22 + PAS≤100 + mental alterado`],
    simples:`Não é só uma infecção no pulmão: a resposta do corpo descontrolou e começou a desligar outros órgãos.`,
    preceptor:`Nomeie a sepse explicitamente — o nome liga o relógio do antibiótico.`,erro:`Subestimar como pneumonia de enfermaria.`}},
  {type:'q',etapa:'Etapa 3 · Sepse ou choque séptico?',q:`Ele está em sepse ou em choque séptico?`,
   accept:['choque septico','choque','septico'],reject:['so sepse','apenas sepse'],
   fb:{good:`Choque séptico — hipotensão que exigirá vasopressor para PAM ≥65 + lactato >2.`,miss:`Hipotensão persistente, necessidade de vasopressor para PAM ≥65 e lactato >2 = choque séptico (forma mais grave).`},
   teach:{reconhecer:`Choque séptico = vasopressor para PAM ≥65 + lactato >2 apesar do volume.`,
    pensar:[`Hipotenso após volume? Vai precisar de vasopressor + lactato alto? → choque séptico.`],
    pegadinha:`Chamar de choque séptico qualquer hipotensão — precisa de vasopressor + lactato >2.`,
    decore:[`Choque séptico = vasopressor p/ PAM≥65 + lactato >2`],
    simples:`Mesmo depois de soro, a pressão não sobe e o lactato (sofrimento dos tecidos) está alto. É o degrau mais grave.`,
    preceptor:`Choque séptico tem definição precisa — não use o termo de forma frouxa.`,erro:`Rotular cedo ou tarde demais.`}},
  {type:'q',etapa:'Etapa 4 · Exames',q:`Quais exames você pede de imediato?`,reveal:['labs'],
   accept:['lactato','hemocultura','culturas','gasometria','hemograma'],partial:['exames','funcao renal','rx torax'],
   fb:{good:`Lactato, culturas (antes do ATB, sem atrasá-lo), gasometria, hemograma e função orgânica. (Resultados em 📋 Dados.)`,part:`Inclua o essencial: lactato e culturas antes do antibiótico. (Liberei o laboratório.)`,miss:`Pilares: lactato (perfusão) e culturas antes do ATB, gasometria, hemograma, função orgânica. (Resultados em 📋 Dados.)`},
   teach:{reconhecer:`Lactato guia a ressuscitação; culturas guiam o foco/ATB e devem ser colhidas antes do antibiótico.`,
    pensar:[`O que guia volume? Lactato.`,`O que guia o ATB? Culturas (sem atrasá-lo).`],
    pegadinha:`Atrasar o antibiótico esperando colher todas as culturas.`,
    decore:[`Lactato + culturas antes do ATB`,`Nunca atrasar o antibiótico pelas culturas`],
    preceptor:`Culturas antes do ATB é o ideal; ATB no tempo é inegociável.`,erro:`Segurar o antibiótico por causa de exames.`}},
  {type:'q',etapa:'Etapa 5 · Interpretar o lactato',q:`Lactato 5,2 mmol/L. O que isso significa e como usá-lo?`,
   accept:['hipoperfusao','perfusao','gravidade','choque','elevado','alto'],partial:['lactato','ressuscitacao'],
   fb:{good:`Lactato alto (>2, e aqui >4) reflete hipoperfusão/gravidade; serve para guiar a ressuscitação e deve cair com o tratamento.`,miss:`Lactato >2 marca hipoperfusão; >4 é gravidade. Ele guia a ressuscitação — meça seriadamente e espere queda.`},
   teach:{reconhecer:`Lactato elevado = sofrimento tecidual por hipoperfusão; quanto maior, pior o prognóstico.`,
    pensar:[`Lactato é termômetro de perfusão.`,`Reavalie seriado: deve cair com volume/vasopressor.`],
    decore:[`Lactato >2 = hipoperfusão; >4 = gravidade`,`Clareamento do lactato = meta de ressuscitação`],
    simples:`O lactato sobe quando os tecidos ficam sem oxigênio. É o medidor de quão "sufocado" o corpo está — e tem que baixar com o tratamento.`,
    preceptor:`Não meça lactato uma vez só: o que importa é ele cair.`,erro:`Ignorar o lactato seriado.`}},
  {type:'q',etapa:'Etapa 6 · Tratamento',q:`Qual o pacote terapêutico imediato?`,
   accept:['antibiotico','volume','cristaloide','noradrenalina','ressuscitacao'],partial:['atb','vasopressor','fluido','soro'],
   fb:{good:`Cristaloide balanceado (Ringer) ~30 mL/kg nas 3 h em bólus reavaliados + antibiótico na 1ª hora + noradrenalina se PAM<65.`,part:`Os três pilares: volume (~30 mL/kg em bólus reavaliados), antibiótico na 1ª hora, noradrenalina se persistir hipotenso.`,miss:`Volume (30 mL/kg em bólus reavaliados, Ringer), antibiótico na 1ª hora direcionado, noradrenalina para PAM ≥65.`},
   teach:{reconhecer:`Pacote: volume em bólus reavaliados + antibiótico precoce + noradrenalina se necessário.`,
    pensar:[`1) Volume em bólus, reavaliando.`,`2) Antibiótico na 1ª hora, direcionado.`,`3) Noradrenalina para PAM ≥65.`],
    pegadinha:`Tratar os 30 mL/kg como infusão cega — o livro manda dar em bólus e REAVALIAR.`,
    decore:[`Volume 30 mL/kg/3h em bólus reavaliados`,`ATB na 1ª hora`,`Noradrenalina = 1º vasopressor (PAM≥65)`],
    simples:`Os vasos estão largos e perdendo pressão. Primeiro enchemos com soro; se não sustenta, a noradrenalina aperta os vasos.`,
    preceptor:`Volume, antibiótico e vasopressor — e o antibiótico é o que mais salva.`,erro:`Atrasar o antibiótico (o erro que mais mata na sepse).`}},
  {type:'resumo',dx:`Choque séptico de foco pulmonar`,
   criterios:`Sepse = infecção + ↑≥2 SOFA. qSOFA (FR≥22, PAS≤100, mental) rastreia. Choque séptico = vasopressor p/ PAM≥65 + lactato >2.`,
   conduta:`Cristaloide balanceado 30 mL/kg/3h em bólus reavaliados; antibiótico na 1ª hora direcionado; noradrenalina p/ PAM≥65; lactato seriado.`,
   pega:`O livro preconiza 30 mL/kg nas 3 h, mas em bólus reavaliados — não infusão cega. Culturas antes do ATB, sem atrasar o antibiótico.`}
 ]},

  {type:'q',etapa:'Etapa 1 · Existe CAD?',q:`Com os exames em 📋 Dados, há cetoacidose diabética?`,
   accept:['sim','cetoacidose','cad','cetoacidose diabetica'],
   fb:{good:`Sim — glicemia >250 + acidose (pH<7,3) + cetonemia positiva fecham CAD.`,miss:`A tríade está completa: glicemia 480 (>250) + pH 6,98 (acidose) + cetonemia positiva = CAD.`},
   teach:{reconhecer:`CAD = glicemia >250 + acidose metabólica (pH<7,3) + cetonemia/cetonúria.`,
    pensar:[`Tem a tríade? Sim → CAD.`],decore:[`CAD = glicemia >250 + pH<7,3 + cetonemia`],

   teach:{reconhecer:`Gravidade da CAD é definida pelo pH/HCO₃ (e estado mental), não pela glicemia.`,
    pensar:[`pH 6,98 e HCO₃ 7 → grave.`],pegadinha:`Classificar pela glicemia.`,
    decore:[`Grave: pH<7,00 / HCO₃<10`,`Leve 7,25–7,30 · moderada 7,00–7,24`],
    preceptor:`A glicemia abre o diagnóstico; o pH define a gravidade.`,erro:`Achar que "glicemia 600" é mais grave que "pH 6,9".`}},
  {type:'q',etapa:'Etapa 3 · Primeira medida',q:`Qual a PRIMEIRA medida terapêutica?`,

   fb:{good:`Reposição volêmica — NaCl 0,9% em bólus (ex.: 2 L). Insulina só depois e com o K conferido.`,miss:`Pegadinha clássica: NÃO se começa pela insulina. Primeiro VOLUME (NaCl 0,9% em bólus).`},
   teach:{reconhecer:`Paciente desidratado por dias de glicosúria → volume primeiro.`,
    pensar:[`O mais ameaçador agora é a hipovolemia.`,`Volume → depois K → depois insulina.`],
    pegadinha:`Começar pela insulina piora a perfusão e desloca o K bruscamente.`,
    decore:[`Sequência: 1) Volume → 2) Potássio → 3) Insulina`],
    simples:`Ela passou dias urinando glicose e perdendo água; chega seca. Insulina antes do líquido pode piorar tudo.`,
    preceptor:`Na CAD, soro antes de insulina. Sempre.`,erro:`Começar insulina antes da hidratação (o erro que mais reprova na CAD).`}},
  {type:'q',etapa:'Etapa 4 · Interpretar o potássio',q:`K⁺ está 5,4. Como interpretar e o que muda?`,

   teach:{reconhecer:`O K sérico inicial engana: o K corporal total está baixo e vai cair com a insulina.`,
    pensar:[`<3,3 → repor antes da insulina.`,`3,3–5,0 → 25 mEq/L.`,`>5,0 → só repor quando <5.`],
    pegadinha:`Ver K "normal/alto" e relaxar.`,
    decore:[`K <3,3 → repor antes da insulina`,`Insulina baixa o K (entra na célula)`],
    simples:`A insulina empurra o potássio para dentro das células; se já estiver baixo, pode parar o coração.`,
    preceptor:`Nunca ligue a insulina sem olhar o potássio.`,erro:`Iniciar insulina com K <3,3.`}},
  {type:'q',etapa:'Etapa 5 · Pode iniciar insulina?',q:`Com K 5,4 e volume em curso: pode iniciar insulina?`,
   accept:['sim','pode'],partial:['apos volume','com potassio'],reject:['nao iniciar'],
   fb:{good:`Sim — K ≥3,3 e volume em curso permitem iniciar. (Se K fosse <3,3, repor K antes.)`,part:`Pode, pois K ≥3,3 e há reposição volêmica; só não iniciaria se K <3,3.`,miss:`Como K ≥3,3 e o volume já corre, pode iniciar a insulina. A trava é K <3,3.`},
   teach:{reconhecer:`Insulina liberada quando o volume está em curso e K ≥3,3.`,
    pensar:[`K <3,3? Não → pode iniciar.`,`Volume em curso? Sim.`],
    decore:[`Trava da insulina = K <3,3`],preceptor:`A insulina espera o volume e o potássio, não a glicemia.`}},
  {type:'q',etapa:'Etapa 6 · Esquema de insulina',q:`Qual o esquema de insulina IV?`,

   fb:{good:`Insulina regular IV: ~0,1 U/kg em bolus + 0,1 U/kg/h (ou 0,14 U/kg/h sem bolus). Glicemia <250 → adicionar SG 5%.`,part:`É insulina regular IV: ~0,1 U/kg bolus + 0,1 U/kg/h. Glicemia <250 → SG 5%.`,miss:`Insulina regular IV: bolus 0,1 U/kg + infusão 0,1 U/kg/h. Glicemia <250 → SG 5% mantendo a insulina para fechar a cetose.`},
   teach:{reconhecer:`Insulina regular IV em infusão contínua, titulada.`,
    pensar:[`0,1 U/kg/h.`,`Glicemia <250 → entra SG 5% e a insulina continua.`],
    pegadinha:`Desligar a insulina quando a glicose normaliza — ela fecha a CETOSE, não só a glicemia.`,
    decore:[`Insulina 0,1 U/kg/h`,`Glicemia <250 → SG 5%, insulina continua`],
    simples:`A insulina apaga o incêndio de ácido; quando a glicose cai, damos açúcar junto para manter a insulina até o ácido sumir.`,
    preceptor:`A meta da insulina é a cetose, não só a glicemia.`,erro:`Parar a insulina cedo demais.`}},
  {type:'resumo',dx:`Cetoacidose diabética grave`,
   criterios:`Glicemia >250 + acidose (pH<7,3) + cetonemia. Grave: pH<7,00 e HCO₃<10. Mau prognóstico: alteração do estado mental.`,
   conduta:`1) Volume (NaCl 0,9% bólus). 2) Conferir K (regra <3,3 / 3,3–5 / >5). 3) Insulina 0,1 U/kg/h. 4) SG 5% quando glicemia <250. Bicarbonato só se pH ≤6,9.`,
   pega:`Nunca comece pela insulina e nunca a infunda com K <3,3.`}
 ]},

  pensar:[`P e QRS marcham sem relação fixa → BAV total.`,`Instável → atropina (costuma falhar) + marca-passo.`],
  pegadinha:`Confundir com bradicardia sinusal ou com BAV de 2º grau.`,decore:[`BAV total = dissociação AV completa`,`Atropina falha → marca-passo`],
  simples:`Andar de cima e de baixo do coração batendo cada um para o seu lado.`,
  preceptor:`Marque P e QRS separados; sem sincronia = bloqueio total.`,erro:`Só observar, perdendo a indicação de marca-passo.`},
 e_stemi:{reconhecer:`Supradesnivelamento de ST; localize pela derivação acometida.`,
  pensar:[`Tem supra? Sim → IAMCST.`,`Qual parede/derivações? → artéria → reperfusão.`],
  pegadinha:`Esperar troponina para reperfundir, ou não localizar a parede.`,decore:[`Supra → IAMCST → reperfusão (angioplastia primária)`,`Inferior: DII/DIII/aVF (CD) · anterior: V1–V4 (DA) · lateral: DI/aVL/V5–V6 (Cx)`],
  simples:`Quando o segmento ST sobe, há artéria entupida. Abra rápido.`,
  preceptor:`Supra = relógio no ECG. Localize a parede e chame a hemodinâmica.`,erro:`Esperar enzima para agir no supra.`},
 e_bavhi:{reconhecer:`Ondas P bloqueadas de forma intermitente (QRS caindo), bradicardia → BAV de 2º grau avançado.`,
  pensar:[`Algumas P não conduzem (o QRS some)? BAV de 2º grau.`,`Avançado/Mobitz II → responde mal à atropina → marca-passo.`],
  pegadinha:`Diferenciar Mobitz I (PR aumenta até cair) de Mobitz II (PR fixo e cai súbito) — o Mobitz II é mais perigoso.`,decore:[`Mobitz I = PR aumenta até cair (geralmente benigno)`,`Mobitz II/avançado = PR fixo + cai → marca-passo`],
  simples:`De vez em quando uma batida falha. Quando falha de repente, sem aviso, é o tipo perigoso.`,
  preceptor:`Mobitz II não namora atropina: pense em marca-passo.`,erro:`Tratar Mobitz II como benigno.`}
};

/* teaching das gasometrias (um por caso) */
const TEACH_GASO={
 g1:{reconhecer:`pH 7,12 (acidemia) + HCO₃ 8 (baixo) → acidose metabólica. PaCO₂ 24 baixo = compensação respiratória. Lactato 7 → acidose lática.`,
  pensar:[`Passo 1: pH <7,35? Sim → acidose.`,`Passo 2: HCO₃ baixo? Sim → metabólica.`,`Passo 3: PaCO₂ caiu? Sim → o pulmão compensa.`,`Ânion-gap alto (lactato)? → acidose de AG aumentado.`],
  pegadinha:`Esquecer o ânion-gap. Toda acidose metabólica pede AG = Na − (Cl+HCO₃).`,decore:[`Acidose metabólica → calcular AG = Na − (Cl+HCO₃), normal 10 ± 2`,`Winter: PaCO₂ esperada = 1,5×HCO₃ + 8 ± 2`],
  simples:`O sangue azedou e o bicarbonato (o antiácido do corpo) está baixo. O pulmão tenta ajudar respirando rápido para soprar ácido (CO₂).`,
  preceptor:`Toda acidose metabólica: cheque o ânion-gap e veja se o pulmão compensa pela fórmula de Winter.`,erro:`Diagnosticar "acidose metabólica" e não calcular o ânion-gap.`},
 g2:{reconhecer:`pH 7,52 (alcalemia) + PaCO₂ 30 (baixo) + HCO₃ normal → alcalose respiratória; HCO₃ normal = aguda.`,
  pensar:[`pH >7,45 → alcalose.`,`PaCO₂ baixo com HCO₃ normal → respiratória.`,`HCO₃ ainda normal → aguda (o rim ainda não compensou).`],
  pegadinha:`Esperar compensação renal imediata — ela é lenta (horas a dias).`,decore:[`Alcalose respiratória = PaCO₂ baixo (hiperventilação)`,`Compensação renal é lenta`],
  simples:`A pessoa respira rápido demais e sopra ácido demais; o sangue fica alcalino. O rim ainda não teve tempo de ajustar.`,
  preceptor:`Hiperventilou? Pense em alcalose respiratória. Olhe o HCO₃ para datar (aguda x crônica).`,erro:`Confundir com alcalose metabólica (essa tem HCO₃ alto).`},
 g3:{reconhecer:`pH 7,30 + PaCO₂ 60 (alto) → acidose respiratória; HCO₃ 29 (alto) = compensação renal (crônica).`,
  pensar:[`pH baixo → acidose.`,`PaCO₂ alto → respiratória.`,`HCO₃ subiu → o rim compensa → crônica/agudizada.`],
  pegadinha:`Achar que HCO₃ alto = alcalose metabólica. Aqui é COMPENSAÇÃO de uma acidose respiratória.`,decore:[`Acidose respiratória = PaCO₂ alto (hipoventilação)`,`HCO₃ alto pode ser só compensação`],
  simples:`A pessoa respira de menos e acumula ácido (CO₂). Com o tempo, o rim segura bicarbonato para compensar.`,
  preceptor:`Não leia o HCO₃ isolado: alto pode ser distúrbio primário OU compensação. O pH desempata.`,erro:`Ler HCO₃ alto como alcalose metabólica sem olhar pH/PaCO₂.`},
 g4:{reconhecer:`pH 7,46 + HCO₃ 34 (alto) → alcalose metabólica; PaCO₂ 46 (subindo) = compensação respiratória (hipoventilação).`,
  pensar:[`pH alto → alcalose.`,`HCO₃ alto → metabólica.`,`PaCO₂ subiu → o pulmão compensa.`],
  pegadinha:`Confundir com acidose respiratória (PaCO₂ alto). O pH manda: aqui está alcalino.`,decore:[`Alcalose metabólica = HCO₃ alto`,`Tratar corrigindo volume, cloro e potássio`],
  simples:`Sobra de antiácido (bicarbonato) deixa o sangue alcalino; o pulmão respira mais devagar para segurar ácido e compensar.`,
  preceptor:`Alcalose metabólica costuma vir de vômito/diurético: pense em repor cloro, volume e potássio.`,erro:`Olhar só o PaCO₂ alto e cravar acidose respiratória.`},
 g5:{reconhecer:`pH 7,18 (acidemia grave) + HCO₃ 12 (acidose metabólica) E PaCO₂ 55 (acidose respiratória) → distúrbio MISTO (as duas acidoses se somam).`,
  pensar:[`pH muito baixo.`,`HCO₃ baixo (metabólica) E PaCO₂ alto (respiratória) ao mesmo tempo.`,`A compensação anda no sentido errado → misto.`],
  pegadinha:`Quando o que deveria compensar piora o pH, é distúrbio misto — não compensação.`,decore:[`Compensação no sentido errado = distúrbio misto`,`Acidose metabólica + respiratória = pH despenca`],

 g6:{reconhecer:`pH 7,40, PaCO₂ 40, HCO₃ 24 → aparentemente normal. Mas um pH normal pode esconder distúrbio misto.`,

/* ---------- render do painel preceptor ---------- */
let _tuid=0;
function teachPanel(t){
  if(!t)return '';
  _tuid++; const u='tv'+_tuid;
  let h='<div class="teach">';
  if(t.reconhecer)h+=`<div class="teach-sec"><span class="tlabel">Como reconhecer</span><p>${t.reconhecer}</p></div>`;
  if(t.pensar&&t.pensar.length)h+=`<div class="teach-sec"><span class="tlabel">Como pensar</span><ul class="think">`+t.pensar.map(s=>`<li>${s}</li>`).join('')+`</ul></div>`;
  if(t.pegadinha)h+=`<div class="teach-sec"><span class="tlabel">Pegadinha clássica da prova</span><p>${t.pegadinha}</p></div>`;
  if(t.decore&&t.decore.length)h+=`<div class="decore"><span class="tlabel">📌 Decore</span><ul>`+t.decore.map(d=>`<li>${d}</li>`).join('')+`</ul></div>`;
  h+='<div class="teach-btns">';
  if(t.simples)h+=`<button class="tbtn" onclick="tog('${u}s')">🧠 Explique de forma simples</button>`;
  if(t.preceptor)h+=`<button class="tbtn" onclick="tog('${u}p')">👨‍⚕️ O que um preceptor diria?</button>`;
  if(t.erro)h+=`<button class="tbtn" onclick="tog('${u}e')">🚫 Erro que mais reprova</button>`;
  h+='</div>';
  if(t.simples)h+=`<div class="treveal simples" id="${u}s">${t.simples}</div>`;
  if(t.preceptor)h+=`<div class="treveal" id="${u}p"><b>Preceptor:</b> ${t.preceptor}</div>`;
  if(t.erro)h+=`<div class="treveal erro" id="${u}e"><b>Erro que mais reprova:</b> ${t.erro}</div>`;
  return h+'</div>';
}
function tog(id){const e=document.getElementById(id);if(e)e.style.display=(e.style.display==='block'?'none':'block');}
function fluxoBlock(arr){
  if(!arr||!arr.length)return '';
  const body=arr.map((s,i)=>{
    const isQ=/\?$/.test(s); const isEnd=(i===arr.length-1);
    const cls='fstep'+(isQ?' q':'')+(isEnd?' end':'');
    return `<span class="${cls}">${s}</span>`+(i<arr.length-1?`<span class="farr">↓</span>`:'');
  }).join('');
  return `<div class="teach" style="padding:14px 17px"><span class="tlabel">🧠 Como pensar na prova</span><div class="fluxo">${body}</div></div>`;
}

<script id="views">

const app=document.getElementById('app');

/* navegação central */

/* cabeçalho de marca (hub) */
function brandHead(){

}

function labsBlock(b){

    h+='<div class="labgrid">'+b.items.map(it=>`<div class="lab"><span class="n">${it[0]}</span><span class="v ${it[2]||''}">${it[1]}</span></div>`).join('')+'</div>';
  }

/* feedback do preceptor */
function feedbackBox(grade,fb){
  const cls=grade==='good'?'good':grade==='part'?'part':'miss';
  const who=grade==='good'?'Preceptor · acertou':grade==='part'?'Preceptor · quase lá':'Preceptor · atenção';
  const msg=(fb&&fb[grade])||(fb&&fb.miss)||'';
  return `<div class="feedback ${cls}"><span class="who">${who}</span>${msg}</div>`;
}
function resumoBlock(b){
  return `<div class="resumo"><h3>Resumo PR2</h3><dl>
    <dt>Diagnóstico</dt><dd>${b.dx}</dd>
    <dt>Critérios / interpretação</dt><dd>${b.criterios}</dd>
    <dt>Conduta</dt><dd>${b.conduta}</dd>
    <dt>Pegadinha</dt><dd class="pega">${b.pega}</dd>

}

     <p class="sub">Reconhecer o padrão, classificar a gravidade, decidir a conduta, interpretar o exame, reavaliar. Conteúdo clínico 100% baseado no livro de Medicina de Emergência (USP/HC-FMUSP, 18ª ed.); estilo de cobrança calibrado pelas provas e pelo Desafio Sala Vermelha.</p>

        <span class="glyph">${c[1]}</span>
        <span class="body"><span class="name">${c[2]}</span><span class="desc">${c[3]}</span><span class="meta">${c[4]}</span></span>
        <span class="chev">›</span></button>`).join('')+

     <p class="disclaimer">Fonte soberana do conteúdo: <em>Medicina de Emergência: Abordagem Prática</em>, USP/HC-FMUSP, 18ª ed. (Manole). Traçados de ECG são esquemáticos, para treino de reconhecimento. Ferramenta de estudo — não substitui protocolo institucional nem julgamento clínico à beira do leito.</p>`;
};

/* ============================================================
   PLANTÃO — lista e runner
   ============================================================ */
VIEWS.plantaoList=function(){
  app.innerHTML=topbar('Plantão Sala Vermelha','hub')+
    `<h1 class="lede" style="font-size:24px">Escolha o caso</h1>
     <p class="sub">Cada caso é uma investigação: você decide o que pedir, interpreta os dados e constrói o diagnóstico. Dados → interpretação → raciocínio → diagnóstico → conduta. O painel <em>📋 Dados disponíveis</em> fica visível o tempo todo.</p>
     <div class="list">`+
    PLANTAO.map(c=>`<button class="litem ${isSolved('plantao',c.id)?'solved':''}" onclick="startCase('${c.id}')">
        <span class="t">${c.who}</span>
        <span style="display:flex;gap:8px;align-items:center">
          <span class="s">${topic(c.topic)}</span><span class="tag">${c.sev}</span>
        </span></button>`).join('')+
    `</div>`;
};

let CASE=null;
function startCase(id){CASE={id:id,i:0,answered:{},dadosOpen:true};window.scrollTo(0,0);renderCase();}

/* dados liberados até a etapa atual (base + reveal de blocos já vencidos) */
function caseUnlocked(c){
  const u=new Set(c.baseData||['vitais']);
  for(let k=0;k<=CASE.i && k<c.blocks.length;k++){
    const b=c.blocks[k];
    const interactive=(b.type==='q'||b.type==='choice'||b.type==='action');
    const passed=interactive?!!CASE.answered[k]:true;
    if(passed){
      if(b.reveal)b.reveal.forEach(x=>u.add(x));
      if(b.type==='action'&&CASE.answered[k]){const o=b.options[CASE.answered[k].opt];if(o&&o.reveal)o.reveal.forEach(x=>u.add(x));}
    }
  }
  return u;
}
function dataItemHTML(d){
  const cap=d.cap?`<div class="cap">${d.cap}</div>`:'';
  if(d.kind==='vitals')return monitor(d.vals);
  if(d.kind==='ecg')return cap+ecgSVG(d.ecg,d.lead||'DII')+(d.note?`<p class="dnote">${d.note}</p>`:'');
  if(d.kind==='labs')return cap+'<div class="labgrid">'+d.items.map(it=>`<div class="lab"><span class="n">${it[0]}</span><span class="v ${it[2]||''}">${it[1]}</span></div>`).join('')+'</div>';
  if(d.kind==='exam'||d.kind==='image')return cap+`<p class="dnote">${d.text}</p>`;
  return '';
}
function renderDados(c,unlocked){
  const items=c.data.filter(d=>unlocked.has(d.key));
  const body=items.length?items.map(dataItemHTML).join('<hr class="ddiv">'):`<p class="dados-empty">Ainda sem dados coletados — decida sua primeira atitude.</p>`;
  const open=CASE.dadosOpen!==false;
  return `<div class="dados">
    <button class="dados-head" onclick="toggleDados()"><span class="dh-t">📋 Dados disponíveis</span><span class="dh-c" id="dadosCaret">${open?'▾ ocultar':'▸ abrir'}</span></button>
    <div class="dados-body" id="dadosBody" style="display:${open?'block':'none'}">${body}</div>
  </div>`;
}
function toggleDados(){CASE.dadosOpen=!(CASE.dadosOpen!==false);const b=$('dadosBody'),c=$('dadosCaret');if(b)b.style.display=CASE.dadosOpen?'block':'none';if(c)c.textContent=CASE.dadosOpen?'▾ ocultar':'▸ abrir';}
function verdictLabel(g){return g==='good'?'✅ Correto':g==='part'?'⚠️ Parcialmente correto':'❌ Incorreto';}

function renderBlock(c,b,k,active){
  const last=(k===c.blocks.length-1);
  const cont=(active&&!last)?`<div class="btnrow"><button class="btn" onclick="nextStep()">Continuar ›</button></div>`:'';
  if(b.type==='q'){
    let s='<div class="step"><div class="etapa">'+b.etapa+'</div><div class="q">'+b.q+'</div>';
    const a=CASE.answered[k];
    if(!a){
      s+=`<div class="field"><input type="text" id="ans${k}" placeholder="Sua resposta…" autocomplete="off"
            onkeydown="if(event.key==='Enter')submitAnswer(${k})">
            <button class="btn" onclick="submitAnswer(${k})">Responder</button></div>
            <div class="scorebar">Resposta aberta — sinônimos e abreviações são aceitos.</div>`;
    }else{
      s+=`<div class="note">Você respondeu: "${esc(a.input)}" — ${verdictLabel(a.grade)}</div>`+feedbackBox(a.grade,b.fb)+teachPanel(b.teach)+cont;
    }
    return s+'</div>';
  }
  if(b.type==='choice'||b.type==='action'){
    const a=CASE.answered[k];
    let s='<div class="step"><div class="etapa">'+b.etapa+'</div><div class="q">'+b.q+'</div><div class="choices">';
    b.options.forEach((o,idx)=>{
      let cls='choice';
      if(a){
        const right=(b.type==='choice')?!!o.correct:!!o.best;
        if(right)cls+=' correct'; else if(a.opt===idx)cls+=' wrong';
        cls+=' disabled';
      }
      s+=`<button class="${cls}" ${a?'':`onclick="pickOpt(${k},${idx})"`}><span class="k">${'ABCD'[idx]||'•'}</span>${o.label}</button>`;
    });
    s+='</div>';
    if(a)s+=`<div class="note">${verdictLabel(a.grade)}</div>`+feedbackBox(a.grade,b.fb)+teachPanel(b.teach)+cont;
    return s+'</div>';
  }
  if(b.type==='evo')return `<div class="step"><div class="etapa">Evolução</div><p class="narr" style="margin:0">${b.text}</p></div>`+cont;
  if(b.type==='resumo'){
    markSolved('plantao',c.id);
    const idx=PLANTAO.findIndex(x=>x.id===c.id);const nxt=PLANTAO[idx+1];
    return resumoBlock(b)+fluxoBlock(c.fluxo)+
      `<div class="btnrow"><button class="btn ghost" onclick="go('plantaoList')">‹ Casos</button>`+
      (nxt?`<button class="btn" onclick="startCase('${nxt.id}')">Próximo caso ›</button>`:`<button class="btn" onclick="go('hub')">Encerrar plantão</button>`)+`</div>`;
  }
  return '';
}

function renderCase(){
  const c=PLANTAO.find(x=>x.id===CASE.id);
  if(CASE.dadosOpen===undefined)CASE.dadosOpen=true;
  _tuid=0;
  const unlocked=caseUnlocked(c);
  let h=topbar('Plantão · '+topic(c.topic),'plantaoList');
  h+=`<div class="casehead"><span class="who">${c.who}</span><span class="chip">${c.chip}</span></div><p class="narr">${c.hist}</p>`;
  h+=renderDados(c,unlocked);
  for(let k=0;k<=CASE.i && k<c.blocks.length;k++){
    h+=renderBlock(c,c.blocks[k],k,(k===CASE.i));
  }
  app.innerHTML=h;
  const inp=$('ans'+CASE.i);if(inp)inp.focus();
}
function submitAnswer(k){
  const c=PLANTAO.find(x=>x.id===CASE.id);const b=c.blocks[k];
  const inp=$('ans'+k);if(!inp)return;const val=inp.value.trim();
  if(!val){inp.focus();return;}
  CASE.answered[k]={input:val,grade:gradeOpen(val,b)};
  renderCase();
}
function pickOpt(k,idx){
  const c=PLANTAO.find(x=>x.id===CASE.id);const b=c.blocks[k];
  const grade=(b.type==='choice')?(b.options[idx].correct?'good':'miss'):(b.options[idx].best?'good':'part');
  CASE.answered[k]={opt:idx,grade:grade};
  renderCase();
}
function nextStep(){const c=PLANTAO.find(x=>x.id===CASE.id);if(CASE.i<c.blocks.length-1){CASE.i++;renderCase();window.scrollTo(0,document.body.scrollHeight);}}

/* ============================================================
   ECG CHALLENGE
   ============================================================ */
VIEWS.ecgList=function(){
  app.innerHTML=topbar('ECG Challenge','hub')+
    `<h1 class="lede" style="font-size:24px">Reconhecimento de ritmo</h1>
     <p class="sub">Para cada traçado: ritmo, frequência, estabilidade e conduta. Corrija e veja o raciocínio.</p>
     <div class="list">`+
    ECG_ITEMS.map((e,i)=>`<button class="litem" onclick="startEcg(${i})">
        <span class="t">Traçado ${i+1}</span><span class="s">${e.lead} · ${e.estab}</span></button>`).join('')+
    `</div>`;
};
let ECGRUN=null;
function startEcg(i){ECGRUN={i:i,estab:null,checked:false};window.scrollTo(0,0);renderEcg();}
function renderEcg(){
  const e=ECG_ITEMS[ECGRUN.i]; _tuid=0;
  let h=topbar('ECG · '+(ECGRUN.i+1)+'/'+ECG_ITEMS.length,'ecgList');
  h+=monitor(e.vitals)+ecgSVG(e.type,e.lead);
  if(!ECGRUN.checked){
    h+=`<div class="step"><div class="etapa">Etapa 1 · Ritmo</div>
        <div class="field"><input type="text" id="ecgRitmo" placeholder="Qual o ritmo?" autocomplete="off"></div></div>
      <div class="step"><div class="etapa">Etapa 2 · Frequência</div>
        <div class="field"><input type="text" id="ecgFc" placeholder="FC aproximada" autocomplete="off"></div></div>
      <div class="step"><div class="etapa">Etapa 3 · Estabilidade</div>
        <div class="choices">
          <button class="choice" id="estE" onclick="selEstab('estavel')"><span class="k">A</span>Estável</button>
          <button class="choice" id="estI" onclick="selEstab('instavel')"><span class="k">B</span>Instável</button>
        </div></div>
      <div class="step"><div class="etapa">Etapa 4 · Conduta</div>
        <div class="field"><input type="text" id="ecgCond" placeholder="Conduta imediata" autocomplete="off"></div></div>
      <div class="btnrow"><button class="btn" onclick="checkEcg()">Corrigir</button></div>`;
  }else{
    const r=ECGRUN.res;
    h+=`<div class="step"><div class="etapa">Ritmo</div><div class="note">Você: "${esc(r.ritmo.input)}"</div>${feedbackBox(r.ritmo.grade,{good:e.ritmo.fb,part:e.ritmo.fb,miss:e.ritmo.fb})}</div>`;
    h+=`<div class="step"><div class="etapa">Frequência</div><div class="note">Você: "${esc(r.fc.input)}"</div>${feedbackBox(r.fc.grade,{good:e.fc.fb,part:e.fc.fb,miss:e.fc.fb})}</div>`;
    h+=`<div class="step"><div class="etapa">Estabilidade</div>${feedbackBox(r.estab.grade,{good:'Correto: '+(e.estab==='estavel'?'estável':'instável')+'.',miss:'O correto é '+(e.estab==='estavel'?'estável':'instável')+'. Reveja os critérios de instabilidade (hipotensão, rebaixamento, dor isquêmica, choque).'})}</div>`;
    h+=`<div class="step"><div class="etapa">Conduta</div><div class="note">Você: "${esc(r.cond.input)}"</div>${feedbackBox(r.cond.grade,{good:e.conduta.fb,part:e.conduta.fb,miss:e.conduta.fb})}</div>`;
    h+=teachPanel(TEACH_ECG[e.id]);
    const nxt=ECGRUN.i+1<ECG_ITEMS.length;
    h+=`<div class="btnrow"><button class="btn ghost" onclick="go('ecgList')">‹ Lista</button>`+
      (nxt?`<button class="btn" onclick="startEcg(${ECGRUN.i+1})">Próximo ›</button>`:`<button class="btn" onclick="go('hub')">Concluir</button>`)+`</div>`;
  }
  app.innerHTML=h;
  if(!ECGRUN.checked){const r=$('ecgRitmo');if(r)r.focus();}
}
function selEstab(v){ECGRUN.estab=v;
  const e=$('estE'),i=$('estI');if(!e||!i)return;
  e.classList.toggle('correct',v==='estavel');e.classList.remove('wrong');
  i.classList.toggle('correct',v==='instavel');i.classList.remove('wrong');
}
function checkEcg(){
  const e=ECG_ITEMS[ECGRUN.i];
  const ritmo=($('ecgRitmo').value||'').trim();
  const fc=($('ecgFc').value||'').trim();
  const cond=($('ecgCond').value||'').trim();
  ECGRUN.res={
    ritmo:{input:ritmo,grade:gradeOpen(ritmo,e.ritmo)},
    fc:{input:fc,grade:gradeOpen(fc,e.fc)},
    estab:{grade:ECGRUN.estab===e.estab?'good':'miss'},
    cond:{input:cond,grade:gradeOpen(cond,e.conduta)}
  };
  ECGRUN.checked=true;markSolved('ecg',e.id);window.scrollTo(0,0);renderEcg();
}

/* ============================================================
   GASOMETRIA CHALLENGE
   ============================================================ */
VIEWS.gasoList=function(){
  app.innerHTML=topbar('Gasometria Challenge','hub')+
    `<h1 class="lede" style="font-size:24px">Análise passo a passo</h1>
     <p class="sub">pH → distúrbio primário → compensação → misto. Use o analisador nas Calculadoras para casos próprios.</p>
     <div class="list">`+
    GASO_ITEMS.map((g,i)=>`<button class="litem" onclick="startGaso(${i})">
        <span class="t">Gasometria ${i+1}</span><span class="s">pH ${g.vals[0][1]}</span></button>`).join('')+
    `</div>`;
};
let GASORUN=null;
function startGaso(i){GASORUN={i:i,checked:false};window.scrollTo(0,0);renderGaso();}
function renderGaso(){
  const g=GASO_ITEMS[GASORUN.i]; _tuid=0;
  let h=topbar('Gasometria · '+(GASORUN.i+1)+'/'+GASO_ITEMS.length,'gasoList');
  h+='<div class="labpanel"><div class="cap">Gasometria arterial</div><div class="labgrid">'+
     g.vals.map(v=>`<div class="lab"><span class="n">${v[0]}</span><span class="v ${v[2]||''}">${v[1]}</span></div>`).join('')+'</div></div>';
  if(!GASORUN.checked){
    h+=`<div class="step"><div class="etapa">Passo 1 · Acidose ou alcalose?</div>
        <div class="field"><input type="text" id="gpH" placeholder="acidose / alcalose / normal" autocomplete="off"></div></div>
      <div class="step"><div class="etapa">Passo 2 · Respiratório ou metabólico?</div>
        <div class="field"><input type="text" id="gPri" placeholder="metabólica / respiratória" autocomplete="off"></div></div>
      <div class="step"><div class="etapa">Passo 3 · Existe compensação?</div>
        <div class="field"><input type="text" id="gComp" placeholder="há compensação? aguda/crônica?" autocomplete="off"></div></div>
      <div class="step"><div class="etapa">Passo 4 · Simples ou misto?</div>
        <div class="field"><input type="text" id="gMisto" placeholder="distúrbio simples ou misto?" autocomplete="off"></div></div>
      <div class="step"><div class="etapa">Passo 5 · Diagnóstico final</div>
        <div class="field"><input type="text" id="gFinal" placeholder="qual o distúrbio?" autocomplete="off"></div></div>
      <div class="btnrow"><button class="btn" onclick="checkGaso()">Corrigir</button></div>`;
  }else{
    const r=GASORUN.res;
    const fbx=(o,key)=>feedbackBox(o.grade,{good:GASO_ITEMS[GASORUN.i][key].fb,part:GASO_ITEMS[GASORUN.i][key].fb,miss:GASO_ITEMS[GASORUN.i][key].fb});
    h+=`<div class="step"><div class="etapa">Passo 1 · Acidose ou alcalose?</div><div class="note">Você: "${esc(r.pH.input)}" — ${verdictLabel(r.pH.grade)}</div>${fbx(r.pH,'pH')}</div>`;
    h+=`<div class="step"><div class="etapa">Passo 2 · Respiratório ou metabólico?</div><div class="note">Você: "${esc(r.pri.input)}" — ${verdictLabel(r.pri.grade)}</div>${fbx(r.pri,'primario')}</div>`;
    h+=`<div class="step"><div class="etapa">Passo 3 · Compensação?</div><div class="note">Você: "${esc(r.comp.input)}" — ${verdictLabel(r.comp.grade)}</div>${fbx(r.comp,'comp')}</div>`;
    h+=`<div class="step"><div class="etapa">Passo 4 · Simples ou misto?</div><div class="note">Você: "${esc(r.misto.input)}" — ${verdictLabel(r.misto.grade)}</div>${fbx(r.misto,'misto')}</div>`;
    h+=`<div class="step"><div class="etapa">Passo 5 · Diagnóstico final</div><div class="note">Você: "${esc(r.fin.input)}" — ${verdictLabel(r.fin.grade)}</div>${fbx(r.fin,'final')}</div>`;
    h+=teachPanel(TEACH_GASO[g.id]);
    const nxt=GASORUN.i+1<GASO_ITEMS.length;
    h+=`<div class="btnrow"><button class="btn ghost" onclick="go('gasoList')">‹ Lista</button>`+
      (nxt?`<button class="btn" onclick="startGaso(${GASORUN.i+1})">Próximo ›</button>`:`<button class="btn" onclick="go('hub')">Concluir</button>`)+`</div>`;
  }
  app.innerHTML=h;if(!GASORUN.checked){const x=$('gpH');if(x)x.focus();}
}
function checkGaso(){
  const g=GASO_ITEMS[GASORUN.i];
  const pH=($('gpH').value||'').trim(),pri=($('gPri').value||'').trim(),comp=($('gComp').value||'').trim();
  const misto=($('gMisto').value||'').trim(),fin=($('gFinal').value||'').trim();
  GASORUN.res={
    pH:{input:pH,grade:gradeOpen(pH,g.pH)},
    pri:{input:pri,grade:gradeOpen(pri,g.primario)},
    comp:{input:comp,grade:gradeOpen(comp,g.comp)},
    misto:{input:misto,grade:gradeOpen(misto,g.misto)},
    fin:{input:fin,grade:gradeOpen(fin,g.final)}
  };
  GASORUN.checked=true;markSolved('gaso',g.id);window.scrollTo(0,0);renderGaso();
}

/* ============================================================
   SIMULADO PR2
   ============================================================ */
let SIM=null;
VIEWS.simulado=function(){
  SIM={i:0,score:0,answered:false,byTopic:{},pick:null};
  renderSim();
};
function renderSim(){
  if(SIM.i>=SIMULADO.length){return renderSimResult();}
  const q=SIMULADO[SIM.i];
  let h=topbar('Simulado · '+(SIM.i+1)+'/'+SIMULADO.length,'hub');
  h+=`<div class="scorebar">${topic(q.topic)} · acertos ${SIM.score}/${SIM.i}</div>`;
  h+=`<div class="step"><div class="q">${q.q}</div><div class="choices">`;
  q.ch.forEach((opt,idx)=>{
    let cls='choice';
    if(SIM.answered){
      if(idx===q.correct)cls+=' correct';
      else if(idx===SIM.pick)cls+=' wrong';
      cls+=' disabled';
    }
    h+=`<button class="${cls}" onclick="simPick(${idx})"><span class="k">${'ABCD'[idx]}</span>${opt}</button>`;
  });
  h+='</div>';
  if(SIM.answered){
    const ok=SIM.pick===q.correct;
    h+=`<div class="feedback ${ok?'good':'miss'}"><span class="who">${ok?'Correto':'Resposta: '+'ABCD'[q.correct]}</span>${q.expl}</div>`;
    const last=SIM.i===SIMULADO.length-1;
    h+=`<div class="btnrow"><button class="btn" onclick="simNext()">${last?'Ver resultado ›':'Próxima ›'}</button></div>`;
  }
  h+='</div>';
  app.innerHTML=h;
}
function simPick(idx){
  if(SIM.answered)return;
  const q=SIMULADO[SIM.i];SIM.pick=idx;SIM.answered=true;
  SIM.byTopic[q.topic]=SIM.byTopic[q.topic]||{n:0,ok:0};SIM.byTopic[q.topic].n++;
  if(idx===q.correct){SIM.score++;SIM.byTopic[q.topic].ok++;}
  renderSim();
}
function simNext(){SIM.i++;SIM.answered=false;SIM.pick=null;window.scrollTo(0,0);renderSim();}
function renderSimResult(){
  markSolved('sim','done');
  const pct=Math.round(100*SIM.score/SIMULADO.length);
  let h=topbar('Simulado · resultado','hub');
  h+=`<div class="center"><div class="bigscore">${SIM.score}/${SIMULADO.length}</div>
      <p class="sub" style="margin:0 auto">${pct}% de acerto${pct>=70?' — pronta para a Sala Vermelha.':pct>=50?' — quase lá, revise os erros.':' — vale revisar os Tier 1 (arritmias, SCA, sepse).'}</p></div>`;
  h+='<hr class="sep"><div class="cap" style="font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px">Desempenho por tema</div><div class="list">';
  Object.keys(SIM.byTopic).forEach(t=>{const b=SIM.byTopic[t];
    h+=`<div class="litem"><span class="t">${topic(t)}</span><span class="s">${b.ok}/${b.n}</span></div>`;});
  h+='</div><div class="btnrow"><button class="btn ghost" onclick="go(\'hub\')">‹ HUB</button><button class="btn" onclick="go(\'simulado\')">Refazer ›</button></div>';
  app.innerHTML=h;
}

/* ============================================================
   CALCULADORAS — Parkland + Gasometria
   ============================================================ */
const NOVE=[['Cabeça/pescoço',9],['Tórax + abdome (ant.)',18],['Dorso',18],['MSD',9],['MSE',9],['MID',18],['MIE',18],['Genitália',1]];
let PARK={sel:{},peso:70};
VIEWS.tools=function(){
  PARK={sel:{},peso:70};
  app.innerHTML=topbar('Calculadoras','hub')+
    `<h1 class="lede" style="font-size:24px">Parkland & Gasometria</h1>
     <div class="calc">
       <label>Áreas queimadas (Regra dos Nove — não conta 1º grau)</label>
       <div class="bodymap" id="bodymap">`+
       NOVE.map((r,i)=>`<button class="bodybtn" id="bm${i}" onclick="toggleArea(${i},${r[1]})">${r[0]}<span class="pct">${r[1]}%</span></button>`).join('')+
       `</div>
       <label>Peso (kg)</label>
       <input type="number" id="peso" value="70" inputmode="decimal" oninput="calcParkland()">
       <div class="calcout" id="parkOut"></div>
     </div>
     <hr class="sep">
     <div class="calc">
       <label>Analisador de gasometria</label>
       <label>pH</label><input type="number" id="ga_ph" placeholder="7,40" inputmode="decimal" oninput="calcGaso()">
       <label>PaCO₂ (mmHg)</label><input type="number" id="ga_co2" placeholder="40" inputmode="decimal" oninput="calcGaso()">
       <label>HCO₃ (mEq/L)</label><input type="number" id="ga_hco3" placeholder="24" inputmode="decimal" oninput="calcGaso()">
       <label>Na⁺ (opcional, p/ ânion-gap)</label><input type="number" id="ga_na" placeholder="140" inputmode="decimal" oninput="calcGaso()">
       <label>Cl⁻ (opcional)</label><input type="number" id="ga_cl" placeholder="104" inputmode="decimal" oninput="calcGaso()">
       <div class="calcout" id="gasoOut"><span class="lab">Preencha pH, PaCO₂ e HCO₃</span></div>
     </div>
     <p class="note">Fórmulas do livro: Parkland 4 mL × kg × %SCQ (½ nas 8 h, Ringer lactato, diurese-alvo 0,5 mL/kg/h). Ânion-gap = Na − (Cl + HCO₃), normal 10 ± 2. Acidose metabólica: PaCO₂ esperada = (1,5 × HCO₃) + 8 ± 2.</p>`;
  calcParkland();
};
function toggleArea(i,pct){PARK.sel[i]=!PARK.sel[i];$('bm'+i).classList.toggle('sel',PARK.sel[i]);calcParkland();}
function calcParkland(){
  let scq=0;NOVE.forEach((r,i)=>{if(PARK.sel[i])scq+=r[1];});
  const peso=parseFloat(($('peso').value||'').replace(',','.'))||0;
  const out=$('parkOut');if(!out)return;
  if(scq===0||peso===0){out.innerHTML='<span class="lab">Selecione as áreas e informe o peso</span>';return;}
  const total=4*peso*scq, prim8=total/2, taxa8=prim8/8, rem16=total/2, taxa16=rem16/16, diur=(0.5*peso);
  out.innerHTML=`<div class="lab">Volume de Ringer lactato (24 h)</div><div class="big">${Math.round(total).toLocaleString('pt-BR')} mL</div>
    <div class="row"><span>SCQ estimada</span><span>${scq}%</span></div>
    <div class="row"><span>Primeiras 8 h (½)</span><span>${Math.round(prim8).toLocaleString('pt-BR')} mL · ${Math.round(taxa8)} mL/h</span></div>
    <div class="row"><span>16 h seguintes</span><span>${Math.round(rem16).toLocaleString('pt-BR')} mL · ${Math.round(taxa16)} mL/h</span></div>
    <div class="row"><span>Diurese-alvo (adulto)</span><span>~${Math.round(diur)} mL/h (0,5 mL/kg/h)</span></div>`;
}
function calcGaso(){
  const out=$('gasoOut');if(!out)return;
  const ph=parseFloat(($('ga_ph').value||'').replace(',','.'));
  const co2=parseFloat(($('ga_co2').value||'').replace(',','.'));
  const hco3=parseFloat(($('ga_hco3').value||'').replace(',','.'));
  const na=parseFloat(($('ga_na').value||'').replace(',','.'));
  const cl=parseFloat(($('ga_cl').value||'').replace(',','.'));
  if(isNaN(ph)||isNaN(co2)||isNaN(hco3)){out.innerHTML='<span class="lab">Preencha pH, PaCO₂ e HCO₃</span>';return;}
  let estado=ph<7.35?'Acidemia':ph>7.45?'Alcalemia':'pH normal';
  let prim='—',rows=[];
  if(ph<7.35){
    if(hco3<22){prim='Acidose metabólica';
      const esp=(1.5*hco3+8);rows.push(['PaCO₂ esperada (Winter)',(esp-2).toFixed(0)+'–'+(esp+2).toFixed(0)]);
      rows.push(['Compensação respiratória, co2<esp-2?',co2< esp-2?'+ acidose resp. associada':co2>esp+2?'+ alcalose resp. associada':'adequada']);
    } else if(co2>45){prim='Acidose respiratória';}
    else prim='Acidose (avaliar)';
  } else if(ph>7.45){
    if(hco3>26){prim='Alcalose metabólica';}
    else if(co2<35){prim='Alcalose respiratória';}
    else prim='Alcalose (avaliar)';
  } else {
    prim='pH normal — atenção a distúrbio misto';
  }
  let agTxt='';
  if(!isNaN(na)&&!isNaN(cl)){
    const ag=na-(cl+hco3);
    agTxt=ag>12?'alto ('+ag.toFixed(0)+') → acidose de AG aumentado':ag<8?'baixo ('+ag.toFixed(0)+')':'normal ('+ag.toFixed(0)+')';
    rows.unshift(['Ânion-gap',agTxt]);
    if(ag>12){const dd=((ag-10)/(24-hco3));rows.push(['Delta/Delta',isFinite(dd)?dd.toFixed(2)+(dd<1?' (+ acidose hiperclorêmica)':dd>2?' (+ alcalose metab. ou resp. crônica)':' (AG puro)'):'—']);}
  }
  out.innerHTML=`<div class="lab">Interpretação</div><div class="big" style="font-size:21px">${prim}</div>
    <div class="row"><span>Estado</span><span>${estado}</span></div>`+
    rows.map(r=>`<div class="row"><span>${r[0]}</span><span>${r[1]}</span></div>`).join('')+
    `<div class="row" style="border-top:1px dashed var(--line)"><span style="color:var(--ink-faint)">Sempre correlacionar com a clínica.</span><span></span></div>`;
}

  let h=topbar('Casos resolvidos','hub')+`<h1 class="lede" style="font-size:24px">Seu plantão até agora</h1>`;

  }else{
    h+='<div class="list" style="margin-top:16px">'+solved.map(c=>`<button class="litem solved" onclick="startCase('${c.id}')">

  }
  app.innerHTML=h;
};
